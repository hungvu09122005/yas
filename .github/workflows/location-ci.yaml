name: location-ci

on:
  push:
    branches: ['**']
    paths:
      - 'location/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/location-ci.yaml'
      - 'pom.xml'
  pull_request:
    branches: [main]
    paths:
      - 'location/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/location-ci.yaml'
      - 'pom.xml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions

      - name: Install common-library
        run: mvn install -DskipTests -pl common-library

      - name: Run tests with coverage
        run: mvn test jacoco:report -pl location -am

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: location-test-report
          path: location/target/surefire-reports/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: location-coverage
          path: location/target/site/jacoco/

      - name: Check coverage threshold (>= 70%)
        run: mvn jacoco:check@check -pl location

      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && github.event_name == 'pull_request' }}
        with:
          paths: ${{ github.workspace }}/location/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 60
          title: 'Location Coverage Report'
          update-comment: true

      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -pl location -am -Dcheckstyle.output.file=location-checkstyle-result.xml

      - name: Upload Checkstyle result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/location-checkstyle-result.xml'

      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Location-Service-Unit-Test-Results
          path: 'location/**/*-reports/TEST*.xml'
          reporter: java-junit

      - name: Analyze with SonarCloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -pl location -am

  build:
    name: Build
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions

      - name: Build JAR
        run: mvn package -DskipTests -pl location -am

      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./location
          push: true
          tags: ghcr.io/nashtech-garage/yas-location:latest

  publish-coverage:
    name: Publish coverage report
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: location-coverage
          path: ./jacoco-report

      - name: Deploy JaCoCo report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./jacoco-report
          destination_dir: location/coverage
          keep_files: true