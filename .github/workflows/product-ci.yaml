name: product-ci

on:
  push:
    branches: ['**']
    paths:
      - 'product/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/product-ci.yaml'
      - 'pom.xml'
  pull_request:
    branches: [main]
    paths:
      - 'product/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/product-ci.yaml'
      - 'pom.xml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions

      - name: Clear stale Maven cache
        run: rm -rf ~/.m2/repository/com/yas/

      - name: Install dependencies (skip jacoco)
        run: mvn install -Drevision=1.0-SNAPSHOT -DskipTests -Djacoco.skip=true -pl product -am

      - name: Run tests with coverage
        run: mvn verify -Drevision=1.0-SNAPSHOT -pl product

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: product-test-report
          path: product/target/surefire-reports/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: product-coverage
          path: product/target/site/jacoco/

      - name: Check coverage threshold (>= 70%)
        run: mvn -Drevision=1.0-SNAPSHOT jacoco:check@check -pl product

      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && github.event_name == 'pull_request' }}
        with:
          paths: ${{ github.workspace }}/product/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 60
          title: 'Product Coverage Report'
          update-comment: true

      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn -Drevision=1.0-SNAPSHOT checkstyle:checkstyle -pl product -am -Dcheckstyle.output.file=product-checkstyle-result.xml

      - name: Upload Checkstyle result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/product-checkstyle-result.xml'

      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Product-Service-Unit-Test-Results
          path: 'product/**/*-reports/TEST*.xml'
          reporter: java-junit

      - name: Analyze with SonarCloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -Drevision=1.0-SNAPSHOT org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -pl product -pl product

  build:
    name: Build
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions

      - name: Install dependencies (skip jacoco)
        run: mvn install -Drevision=1.0-SNAPSHOT -DskipTests -Djacoco.skip=true -pl product -am

      - name: Build JAR
        run: mvn package -Drevision=1.0-SNAPSHOT -DskipTests -pl product

      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./product
          push: true
          tags: ghcr.io/nashtech-garage/yas-product:latest

  publish-coverage:
    name: Publish coverage report
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: product-coverage
          path: ./jacoco-report

      - name: Deploy JaCoCo report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./jacoco-report
          destination_dir: product/coverage
          keep_files: true