name: Snyk Vulnerability Scan

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  schedule:
    - cron: '0 0 * * *'  # Runs every day at midnight
  workflow_dispatch:

jobs:
  snyk_scan:
    name: Snyk Vulnerability check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'temurin'
          cache: maven

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk to check for vulnerabilities
        # Exit codes: 0=no vulns, 1=vulns found (expected), 2=real error (token/network/crash)
        # Only fail the pipeline on real errors (exit 2), not on found vulnerabilities (exit 1)
        run: snyk test --file=pom.xml --severity-threshold=high --no-monitor; EXIT=$?; [ $EXIT -eq 2 ] && exit 1 || exit 0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_DISABLE_ANALYTICS: '1'
