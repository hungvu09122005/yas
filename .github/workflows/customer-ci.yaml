name: customer-ci
on:
  push:
    branches: ['**']
    paths:
      - 'customer/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/customer-ci.yaml'
      - 'pom.xml'
  pull_request:
    branches: [main]
    paths:
      - 'customer/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/customer-ci.yaml'
      - 'pom.xml'
  workflow_dispatch:
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Run tests with coverage
        run: mvn test jacoco:report -pl customer -am
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: customer-test-report
          path: customer/target/surefire-reports/
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: customer-coverage
          path: customer/target/site/jacoco/
      - name: Check coverage threshold (>= 70%)
        run: mvn jacoco:check@check -pl customer
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && github.event_name == 'pull_request' }}
        with:
          paths: ${{ github.workspace }}/customer/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 60
          title: 'Customer Coverage Report'
          update-comment: true
      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -pl customer -am -Dcheckstyle.output.file=customer-checkstyle-result.xml
      - name: Upload Checkstyle result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/customer-checkstyle-result.xml'
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Customer-Service-Unit-Test-Results
          path: 'customer/**/*-reports/TEST*.xml'
          reporter: java-junit
      - name: Analyze with SonarCloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -pl customer -am
  build:
    name: Build
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Build JAR
        run: mvn package -DskipTests -pl customer -am
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./customer
          push: true
          tags: ghcr.io/nashtech-garage/yas-customer:latest