name: SonarCloud Scan


concurrency:
  group: sonar-cloud-analysis
  cancel-in-progress: false
on:
  workflow_run:
    workflows: ["payment-ci", "cart-ci", "order-ci", "product-ci", "promotion-ci", "rating-ci", "recommendation-ci", "search-ci", "inventory-ci", "location-ci", "media-ci", "customer-ci", "tax-ci", "webhook-ci", "backoffice-ci", "backoffice-bff-ci", "storefront-ci", "storefront-bff-ci", "sampledata-ci", "payment-paypal-ci"]
    types:
      - completed
  workflow_dispatch:

jobs:
  sonarcloud_scan:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'temurin'
          cache: maven

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jacoco-report-*
          merge-multiple: false
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build project
        run: mvn -B install -DskipTests

      - name: Build and analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          mvn -B sonar:sonar \
            -Dsonar.organization=$SONAR_ORGANIZATION \
            -Dsonar.projectKey=$SONAR_PROJECT_KEY \
            -Dsonar.coverage.jacoco.xmlReportPaths=**/jacoco.xml
