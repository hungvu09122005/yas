name: SonarCloud Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sonar-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  sonarcloud_scan:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'temurin'
          cache: maven

      - name: Download test and coverage reports from CI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          mkdir -p sonar-coverage
          mkdir -p sonar-test-results

          workflows=(
            payment-ci
            cart-ci
            order-ci
            product-ci
            promotion-ci
            rating-ci
            recommendation-ci
            search-ci
            inventory-ci
            location-ci
            media-ci
            customer-ci
            tax-ci
            webhook-ci
            backoffice-bff-ci
            storefront-bff-ci
            sampledata-ci
            payment-paypal-ci
          )

          sleep 30

          for workflow in "${workflows[@]}"; do
            run_id="$(gh run list \
              --workflow "$workflow" \
              --commit "$HEAD_SHA" \
              --json databaseId,headSha \
              --limit 20 \
              --jq '.[] | select(.headSha == env.HEAD_SHA) | .databaseId' \
              | head -n 1)"

            if [ -z "$run_id" ]; then
              echo "No $workflow run found for $HEAD_SHA"
              continue
            fi

            echo "Waiting for $workflow run $run_id"
            gh run watch "$run_id" --exit-status

            echo "Downloading coverage artifacts from $workflow run $run_id"
            gh run download "$run_id" \
              --pattern 'jacoco-report-*' \
              --dir "sonar-coverage/$workflow" || true

            echo "Downloading test result artifacts from $workflow run $run_id"
            gh run download "$run_id" \
              --pattern '*-test-report' \
              --dir "sonar-test-results/$workflow" || true
          done

          find sonar-coverage -name jacoco.xml -print | sort | tee sonar-coverage-files.txt
          find sonar-test-results -name 'TEST*.xml' -print | sort | tee sonar-test-result-files.txt

          coverage_paths="$(paste -sd, sonar-coverage-files.txt)"
          if [ -n "$coverage_paths" ]; then
            echo "SONAR_COVERAGE_ARGS=-Dsonar.coverage.jacoco.xmlReportPaths=$coverage_paths" >> "$GITHUB_ENV"
          else
            echo "SONAR_COVERAGE_ARGS=" >> "$GITHUB_ENV"
          fi

          test_report_paths="$(find sonar-test-results -name 'TEST*.xml' -exec dirname {} \; | sort -u | paste -sd, -)"
          if [ -n "$test_report_paths" ]; then
            echo "SONAR_TEST_ARGS=-Dsonar.junit.reportPaths=$test_report_paths" >> "$GITHUB_ENV"
          else
            echo "SONAR_TEST_ARGS=" >> "$GITHUB_ENV"
          fi

      - name: Build project without tests
        run: mvn -B install -DskipTests

      - name: Analyze pull request with SonarCloud
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          mvn -B sonar:sonar \
            -Dsonar.organization=$SONAR_ORGANIZATION \
            -Dsonar.projectKey=$SONAR_PROJECT_KEY \
            $SONAR_COVERAGE_ARGS \
            $SONAR_TEST_ARGS \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }}

      - name: Analyze main branch with SonarCloud
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          mvn -B sonar:sonar \
            -Dsonar.organization=$SONAR_ORGANIZATION \
            -Dsonar.projectKey=$SONAR_PROJECT_KEY \
            $SONAR_COVERAGE_ARGS \
            $SONAR_TEST_ARGS
