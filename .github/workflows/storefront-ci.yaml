name: storefront-ci

on:
  push:
    branches: ['**']
    paths:
      - 'storefront/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/storefront-ci.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'storefront/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/storefront-ci.yaml'
  workflow_dispatch:


jobs:
  test:

    permissions:
      contents: write
      packages: write
      pull-requests: write
      checks: write
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: storefront/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: storefront

      - name: Run Build (Checking for build errors)
        run: npm run build
        working-directory: storefront

      - name: Run Lint
        run: npm run lint
        working-directory: storefront

      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        with:
          projectBaseDir: storefront
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}



  build:

    permissions:
      contents: write
      packages: write
      pull-requests: write
      checks: write
    name: Build
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./storefront
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/yas-storefront:latest
