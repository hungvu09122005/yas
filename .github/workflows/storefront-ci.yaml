name: storefront-ci

on:
  push:
    branches: ['**']
    tags: ['v*']
    paths:
      - 'storefront/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/storefront-ci.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'storefront/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/storefront-ci.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  test:

    permissions:
      contents: write
      packages: write
      pull-requests: write
      checks: write
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: storefront/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: storefront

      - name: Run Build (Checking for build errors)
        run: npm run build
        working-directory: storefront

      - name: Run Lint
        run: npm run lint
        working-directory: storefront



  build:

    permissions:
      contents: write
      packages: write
      pull-requests: write
      checks: write
    name: Build
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Compute image tags
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          BRANCH_TAG=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "branch_tag=${BRANCH_TAG}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./storefront
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/yas-storefront:${{ steps.meta.outputs.short_sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/yas-storefront:${{ steps.meta.outputs.branch_tag }}
            ${{ github.ref_name == 'main' && format('{0}/yas-storefront:latest', secrets.DOCKERHUB_USERNAME) || '' }}
          cache-from: type=gha,scope=${{ github.workflow }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}

      - name: Update Helm Chart values (GitOps)
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            IMAGE_TAG="${GITHUB_REF_NAME}"
          else
            IMAGE_TAG="${{ steps.meta.outputs.short_sha }}"
          fi

          sed -i "s/tag: .*/tag: $IMAGE_TAG/g" k8s/charts/storefront-ui/values.yaml
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add k8s/charts/storefront-ui/values.yaml
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update storefront-ui image tag to $IMAGE_TAG" && git pull --rebase origin main && git push origin HEAD)
