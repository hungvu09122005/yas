name: location-ci-dockerhub

on:
  push:
    branches: ['**']
    paths:
      - 'location/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/location-ci-dockerhub.yaml'
      - 'pom.xml'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Test (giữ nguyên logic từ location-ci.yaml gốc)
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
      pull-requests: write
      checks: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: ./.github/workflows/actions  # Setup JDK 25 + Maven cache

      - name: Install common-library
        run: mvn install -DskipTests -pl common-library

      - name: Run tests with coverage
        run: mvn test jacoco:report -pl location -am

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: location-test-report
          path: location/target/surefire-reports/

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jacoco-report-location
          path: location/target/site/jacoco/
          retention-days: 1

      - name: Check coverage threshold (>= 70%)
        run: mvn jacoco:check@check -pl location

      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -pl location -am -Dcheckstyle.output.file=location-checkstyle-result.xml

      - name: Upload Checkstyle result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@a12be500c097a5cedab881d4785ef9b4a4d3ee6a # master
        with:
          path: '**/location-checkstyle-result.xml'

      - name: Test Results
        uses: dorny/test-reporter@d61b558e8df85cb60d09ca3e5b09653b4477cea7 # v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Location-Service-Unit-Test-Results
          path: 'location/**/*-reports/TEST*.xml'
          reporter: java-junit

  # ─────────────────────────────────────────────────────────────
  # Job 2: Build JAR + Push Docker image → Docker Hub (tag = commit id)
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to Docker Hub
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
      branch_tag: ${{ steps.meta.outputs.branch_tag }}
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: ./.github/workflows/actions  # Setup JDK 25 + Maven cache

      - name: Install common-library
        run: mvn install -DskipTests -pl common-library

      - name: Build JAR
        run: mvn package -DskipTests -pl location -am

      # ── Tính commit id (7 ký tự) và branch-safe tag ──────────
      - name: Compute image tags
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          # Chuẩn hoá tên branch: thay '/' → '-' để dùng làm Docker tag
          BRANCH_TAG=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "branch_tag=${BRANCH_TAG}" >> $GITHUB_OUTPUT
          echo "▶ Commit SHA  : ${SHORT_SHA}"
          echo "▶ Branch tag  : ${BRANCH_TAG}"

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Build & push 2 tags: <commit-sha> + <branch-name> ────
      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./location
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/yas-location:${{ steps.meta.outputs.short_sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/yas-location:${{ steps.meta.outputs.branch_tag }}

      # ── In kết quả ra Job Summary ─────────────────────────────
      - name: Print summary
        run: |
          echo "## ✅ Docker Hub Push thành công" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ secrets.DOCKERHUB_USERNAME }}/yas-location\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag (commit id) | \`${{ steps.meta.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag (branch) | \`${{ steps.meta.outputs.branch_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${GITHUB_REF_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
