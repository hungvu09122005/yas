name: tax-ci

on:
  push:
    branches: ['**']
    paths:
      - 'tax/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/tax-ci.yaml'
      - 'pom.xml'
  pull_request:
    branches: [main]
    paths:
      - 'tax/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/tax-ci.yaml'
      - 'pom.xml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  test:

    permissions:
      contents: write
      packages: write
      pull-requests: write
      checks: write
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions

      - name: Install common-library
        run: mvn install -DskipTests -pl common-library

      - name: Run tests with coverage
        run: mvn test jacoco:report -pl tax -am

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: tax-test-report
          path: tax/target/surefire-reports/

      - name: Upload coverage report for SonarCloud
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-tax
          path: tax/target/site/jacoco/
          retention-days: 1

      - name: Check coverage threshold (>= 70%)
        run: mvn jacoco:check@check -pl tax

      - name: Add coverage report to PR
        id: jacoco
        uses: madrapps/jacoco-report@db72e7e7c96f98d239967958b0a0a6ca7d3bb45f # v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && github.event_name == 'pull_request' }}
        with:
          paths: ${{ github.workspace }}/tax/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 60
          title: 'Tax Coverage Report'
          update-comment: true

      - name: Fail PR if overall coverage is less than 70%
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && github.event_name == 'pull_request' && steps.jacoco.outputs.coverage-overall < 70.0 }}
        run: |
          echo "Coverage is ${{ steps.jacoco.outputs.coverage-overall }}%, which is less than 70%!"
          exit 1

      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -pl tax -am -Dcheckstyle.output.file=tax-checkstyle-result.xml

      - name: Upload Checkstyle result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@a12be500c097a5cedab881d4785ef9b4a4d3ee6a # master
        with:
          path: '**/tax-checkstyle-result.xml'

      - name: Test Results
        uses: dorny/test-reporter@d61b558e8df85cb60d09ca3e5b09653b4477cea7 # v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Tax-Service-Unit-Test-Results
          path: 'tax/**/*-reports/TEST*.xml'
          reporter: java-junit

  build:

    permissions:
      contents: write
      packages: write
      pull-requests: write
      checks: write
    name: Build
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions

      - name: Build JAR
        run: mvn package -DskipTests -pl tax -am

      - name: Compute image tags
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          BRANCH_TAG=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "branch_tag=${BRANCH_TAG}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./tax
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/yas-tax:${{ steps.meta.outputs.short_sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/yas-tax:${{ steps.meta.outputs.branch_tag }}
            ${{ github.ref_name == 'main' && format('{0}/yas-tax:latest', secrets.DOCKERHUB_USERNAME) || '' }}
          cache-from: type=gha,scope=${{ github.workflow }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}

  publish-coverage:
    name: Publish coverage report
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report-tax
          path: ./jacoco-report

      - name: Deploy JaCoCo report to GitHub Pages
        continue-on-error: true
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./jacoco-report
          destination_dir: tax/coverage
          keep_files: true
