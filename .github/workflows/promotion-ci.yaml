name: promotion-ci

on:
  push:
    branches: ['**']
    paths:
      - 'promotion/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/promotion-ci.yaml'
      - 'pom.xml'
  pull_request:
    branches: [main]
    paths:
      - 'promotion/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/promotion-ci.yaml'
      - 'pom.xml'
  workflow_dispatch:


jobs:
  test:

    permissions:
      contents: write        # peaceiris/actions-gh-pages cáº§n push lĂªn gh-pages branch
      pull-requests: write   # madrapps/jacoco-report comment lĂªn PR
      checks: write          # dorny/test-reporter upload test results
      packages: write        # docker/build-push-action push to GHCR
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions

      - name: Install common-library
        run: mvn install -DskipTests -pl common-library

      - name: Run tests with coverage
        run: mvn test jacoco:report -pl promotion -am

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: promotion-test-report
          path: promotion/target/surefire-reports/

      - name: Upload coverage report for SonarCloud
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-promotion
          path: promotion/target/site/jacoco/jacoco.xml
          retention-days: 1

      - name: Check coverage threshold (>= 70%)
        run: mvn jacoco:check@check -pl promotion

      - name: Add coverage report to PR
        id: jacoco
        uses: madrapps/jacoco-report@db72e7e7c96f98d239967958b0a0a6ca7d3bb45f # v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && github.event_name == 'pull_request' }}
        with:
          paths: ${{ github.workspace }}/promotion/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 60
          title: 'Promotion Coverage Report'
          update-comment: true

      - name: Fail PR if overall coverage is less than 70%
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && github.event_name == 'pull_request' && steps.jacoco.outputs.coverage-overall < 70.0 }}
        run: |
          echo "Coverage is ${{ steps.jacoco.outputs.coverage-overall }}%, which is less than 70%!"
          exit 1

      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -pl promotion -am -Dcheckstyle.output.file=promotion-checkstyle-result.xml

      - name: Upload Checkstyle result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@a12be500c097a5cedab881d4785ef9b4a4d3ee6a # master
        with:
          path: '**/promotion-checkstyle-result.xml'

      - name: Test Results
        uses: dorny/test-reporter@d61b558e8df85cb60d09ca3e5b09653b4477cea7 # v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Promotion-Service-Unit-Test-Results
          path: 'promotion/**/*-reports/TEST*.xml'
          reporter: java-junit

  build:

    permissions:
      contents: write        # peaceiris/actions-gh-pages cáº§n push lĂªn gh-pages branch
      pull-requests: write   # madrapps/jacoco-report comment lĂªn PR
      checks: write          # dorny/test-reporter upload test results
      packages: write        # docker/build-push-action push to GHCR
    name: Build
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions

      - name: Build JAR
        run: mvn package -DskipTests -pl promotion -am

      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./promotion
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/yas-promotion:latest

  publish-coverage:
    name: Publish coverage report
    needs: [test]
    runs-on: ubuntu-latest
    concurrency: gh-pages
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: github-pages-deployment
      cancel-in-progress: false
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report-promotion
          path: ./jacoco-report

      - name: Deploy JaCoCo report to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./jacoco-report
          destination_dir: promotion/coverage
          keep_files: true
