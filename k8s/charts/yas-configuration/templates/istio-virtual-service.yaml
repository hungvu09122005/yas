{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: product-retry
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
  - product
  http:
  {{- if .Values.istio.faultInjection }}
  - match:
    - uri:
        exact: /api/v1/fault
    fault:
      abort:
        httpStatus: 500
        percentage:
          value: 100
    route:
    - destination:
        host: product
        port:
          number: 80
    retries:
      attempts: 3
      perTryTimeout: 2s
      retryOn: 5xx,connect-failure,refused-stream
  {{- end }}
  - route:
    - destination:
        host: product
        port:
          number: 80
{{- end }}
