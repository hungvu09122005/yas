{{- if .Values.istio.enabled }}
# ==========================================================
# CẤU HÌNH DEMO BẢO MẬT SERVICE MESH (AUTHORIZATION POLICY)
# ==========================================================
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-bff-to-product
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: product
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/{{ .Release.Namespace }}/sa/storefront-bff"]
{{- end }}
