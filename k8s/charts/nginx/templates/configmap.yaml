apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nginx.fullname" . }}-config
  labels:
    {{- include "nginx.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      # Use kube-dns for service resolution
      resolver kube-dns.kube-system.svc.cluster.local valid=5s;

      client_max_body_size 30m;

      # Proxy headers
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      location /media/ {
        set $upstream "media.{{ .Values.namespace | default .Release.Namespace }}.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /swagger-ui/ {
        set $upstream "swagger-ui.{{ .Values.namespace | default .Release.Namespace }}.svc.cluster.local:8080";
        proxy_pass http://$upstream;
      }
      location /product/ {
        set $upstream "product.{{ .Values.namespace | default .Release.Namespace }}.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /customer/ {
        set $upstream "customer.{{ .Values.namespace | default .Release.Namespace }}.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /cart/ {
        set $upstream "cart.{{ .Values.namespace | default .Release.Namespace }}.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /rating/ {
        set $upstream "rating.{{ .Values.namespace | default .Release.Namespace }}.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /order/ {
        set $upstream "order.{{ .Values.namespace | default .Release.Namespace }}.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /location/ {
        set $upstream "location.{{ .Values.namespace | default .Release.Namespace }}.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /inventory/ {
        set $upstream "inventory.{{ .Values.namespace | default .Release.Namespace }}.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /tax/ {
        set $upstream "tax.{{ .Values.namespace | default .Release.Namespace }}.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /promotion/ {
        set $upstream "promotion.{{ .Values.namespace | default .Release.Namespace }}.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /search/ {
        set $upstream "search.{{ .Values.namespace | default .Release.Namespace }}.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /payment/ {
        set $upstream "payment.{{ .Values.namespace | default .Release.Namespace }}.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /webhook/ {
        set $upstream "webhook.{{ .Values.namespace | default .Release.Namespace }}.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /sampledata/ {
        set $upstream "sampledata.{{ .Values.namespace | default .Release.Namespace }}.svc.cluster.local";
        proxy_pass http://$upstream;
      }
      location /recommendation/ {
        set $upstream "recommendation.{{ .Values.namespace | default .Release.Namespace }}.svc.cluster.local";
        proxy_pass http://$upstream;
      }
    }
